<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }


    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 8px;
      margin-bottom: 10px;
    }


  
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      margin: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .present {
      background-color: #28a745;
      color: white;
    }

    .absent {
      background-color: #dc3545;
      color: white;
    }

    .clear {
      background-color: #ffc107;
      color: black;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
      color: black;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #333;
      color: white;
    }
